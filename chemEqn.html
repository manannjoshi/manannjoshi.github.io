    <h2>1) One mole of <i>carbon </i>reacts with two moles of <i>oxygen</i> to form <i>carbon dioxide.</i></h2>
     <img src="/test/img/co2_molecule_320x200.png" height=200"" width="400">

    <hr>
    <h2>2) Two Moles of <i>water</i> break down to give 2 moles of <i>hydrogen</i> and one mole of <i>oxygen.</i></h2>
    <img src="/test/img/electrolysis-of-water.png" height="200" width="400"> <br>
    <b>2H<sub>2</sub>O = 2H<sub>2</sub> + O<sub>2</sub></b>
