<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🦖 T-Rex Runner | Manan's Portfolio</title>

    <script src="p5.js"></script>
    <script src="p5.dom.min.js"></script>
    <script src="p5.sound.min.js"></script>
    <script src="p5.play.js"></script>

    <link rel="stylesheet" href="style.css">

    <style>

        body{
            margin:0;
            font-family:'Poppins',sans-serif;
            background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
            color:white;
            text-align:center;
        }

        .container{
            width:90%;
            max-width:1100px;
            margin:auto;
            padding:40px 0;
        }

        h1{
            color:#38bdf8;
            font-size:3rem;
            margin-bottom:10px;
        }

        p{
            color:#cbd5e1;
            line-height:1.7;
            margin-bottom:30px;
        }

        .btn{
            display:inline-block;
            padding:12px 28px;
            background:#38bdf8;
            color:#0f172a;
            text-decoration:none;
            border-radius:10px;
            font-weight:600;
            transition:.3s;
            margin-bottom:35px;
        }

        .btn:hover{
            background:white;
            transform:translateY(-3px);
        }

        canvas{
            display:block;
            margin:0 auto;
            border-radius:15px;
            box-shadow:0 0 30px rgba(0,0,0,.35);
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>🦖 T-Rex Runner</h1>

        <p>
            One of my earliest programming projects, inspired by the classic
            Chrome Dinosaur Game. Built using <strong>JavaScript</strong> and
            the <strong>p5.js</strong> library.
        </p>

        <a href="../html.html" class="btn">
            ← Back to HTML Projects
        </a>

    </div>

    <script src="sketch.js"></script>

</body>

</html>
